<div class="noticias">
    <div class="noticia">
        <img src="{{ noticia.cover.url }}" alt="" class="imagem-noticia">
        <div class="news-author">
            <div class="author-mini-wrapper">
                {% if noticia.author.profile_picture %}
                    <img src="{{ noticia.author.profile_picture.url }}" alt="{{ noticia.author.name }}" class="author-mini-img">
                {% else %}
                    <i class="fa-solid fa-circle-user author-mini-icon"></i>
                {% endif %}
            </div>
            <div class="author-info">
                <span class="author-item">
                    {% if noticia.author %}
                        {{ noticia.author.name }}
                    {% else %}
                        Autor Desconhecido
                    {% endif %}
                </span>
                <span class="created-at">{{ noticia.data_publicacao|date:"d/m/Y" }}</span> 
                <span class="news-category">
                    <a href="{% url 'news:category_news' noticia.categoria.id %}">{{ noticia.categoria.nome }}</a>
                </span>
            </div> 
        </div>
        
        <div class="news-information">
            <div class="news-title">
                <a href="{% url 'news:news_detail' noticia.id %}"><h1 class="news-title">{{ noticia.titulo }}</h1></a>
            </div>
            <div class="news-description">
                <a href="{% url 'news:news_detail' noticia.id %}"><p class="subtitle">{{ noticia.descricao }}</p></a>
            </div>    
        </div>

    </div>
</div>
