{% extends "global/base.html" %}
{% load static %}
{% block title %}Login{% endblock %}
{% block extra_css %}
    <link rel="stylesheet" href="{% static 'authors/formsauthors.css' %}">
{% endblock extra_css %}
{% block content %}
<div class="login-container">
    <div class="login-content">
        <h2>Login</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Entrar</button>
        </form>
    </div>
</div>


{% endblock %}
